<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dident Texcoco | Consultorio Dental</title>
    
    <link rel="icon" type="image/png" href="./Logo_dident.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --azul-oceano: #043C67; --verde-eucalipto: #6CA99A; --azul-claro: #A9C7F5; --fondo-principal: #F8F9FA; }

        html { scroll-behavior: smooth; }
        body { background-color: var(--fondo-principal); }

        /* Navbar reducida un 20% respecto a la anterior */
        .navbar-custom {
            background-color: var(--azul-oceano) !important;
            padding: 5px 0;
        }

        .navbar-logo {
            height: 75px; /* Reducción al 80% de los 95px anteriores */
            width: auto;
            object-fit: contain;
        }

        /* En móviles, aseguramos que el logo y la barra no se corten */
        @media (max-width: 991px) {
            .navbar-logo { height: 50px; }
            .navbar-custom { padding: 3px 0; }
        }

        .hero-section {
            background: linear-gradient(rgba(4, 60, 103, 0.7), rgba(4, 60, 103, 0.8)), url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?q=80&w=2070') no-repeat center center/cover;
            color: white;
            padding: 100px 0;
        }

        .card-service { background-color: #ffffff; border-top: 4px solid var(--azul-claro); transition: transform 0.3s; }
        .btn-custom-primary { background-color: var(--verde-eucalipto); color: white; border: none; font-weight: 600; }
        .icon-azul { color: var(--azul-oceano); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom shadow fixed-top">
        <div class="container">
            <a class="navbar-brand py-0" href="#inicio">
                <img src="./Logo_principal.png" alt="Dident Clinica Dental" class="navbar-logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="filter: invert(1);">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link text-white" href="#inicio">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#servicios">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#ubicacion">Ubicación</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-custom-primary" href="https://wa.me/525561961697">Agendar Cita</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Espaciador para compensar el fixed-top -->
    <div style="height: 85px;"></div>

    <main>
        <header id="inicio" class="hero-section text-center">
            <div class="container">
                <h1 class="display-4 fw-bold mb-3">Tu sonrisa en las mejores manos</h1>
                <p class="lead mb-4">Cuidado dental profesional en Texcoco.</p>
                <a href="https://wa.me/525561961697" class="btn btn-success btn-lg"><i class="bi bi-whatsapp"></i> Contáctanos</a>
            </div>
        </header>
        <!-- Resto de secciones... -->
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
